<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PainMatrix - 像素小人生活視覺化</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:linear-gradient(135deg,#1a1a2e,#16213e);--border:#2a2a4a;--text:#e0e0e0;--dim:#888}
body{font-family:"Microsoft YaHei","PingFang SC","Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:10px}
.container{max-width:960px;margin:0 auto}
.pixel-scene{position:relative;background:#0d0d2b;border:3px solid #333;border-radius:8px;overflow:hidden;margin-bottom:14px}
#pixelCanvas{display:block;width:100%;image-rendering:pixelated}
.room-label{position:absolute;top:8px;left:10px;background:rgba(0,0,0,0.6);color:#fff;font-size:12px;padding:3px 10px;border-radius:4px;pointer-events:none;font-family:monospace}
.pain-overlay{position:absolute;inset:0;pointer-events:none;transition:background .8s}
.room-tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.room-tab{padding:5px 12px;border-radius:8px;font-size:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;transition:all .2s;color:#888}
.room-tab.active{background:rgba(102,126,234,.2);border-color:#667eea;color:#fff}
.room-tab:hover{color:#fff}
.status-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px}
.status-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
.status-label{font-size:10px;color:var(--dim);margin-bottom:4px;letter-spacing:1px}
.status-val{font-size:18px;font-weight:900}
.status-val.green{color:#2ed573}.status-val.orange{color:#ffa502}
.status-val.red{color:#ff4757}.status-val.purple{color:#667eea}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:bold;margin-bottom:10px;color:#a0a0c0;border-bottom:1px solid var(--border);padding-bottom:7px}
.mech-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mech-item{background:rgba(255,255,255,.03);padding:10px;border-radius:8px;border:1px solid var(--border)}
.mech-label{font-size:10px;color:#a0a0c0;margin-bottom:3px;letter-spacing:1px}
.mech-val{font-size:12px;color:#ddd;line-height:1.5}
.log-list{max-height:100px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#2a2a4a transparent}
.log-item{display:flex;align-items:center;padding:6px 8px;margin-bottom:4px;background:rgba(255,255,255,.03);border-radius:6px;font-size:11px;border-left:3px solid #ff4757}
.log-item.relief{border-left-color:#2ed573}
.log-time{color:var(--dim);min-width:130px;font-family:monospace;margin-right:6px}
.log-emotion{flex:1}.log-level{font-size:10px;padding:1px 6px;border-radius:8px;margin-left:4px}
.log-level.pain{background:rgba(255,71,87,.15);color:#ff4757}
.log-level.calm{background:rgba(46,213,115,.15);color:#2ed573}
.empty-state{text-align:center;color:var(--dim);padding:16px;font-size:12px}
.activity-bar{background:rgba(0,0,0,.3);padding:8px 12px;border-radius:8px;margin-bottom:10px;font-size:12px;color:#aaa;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.activity-bar strong{color:#fff;font-size:13px}
.activity-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;background:rgba(102,126,234,.15);color:#667eea}
.footer{text-align:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:10px;color:#444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@media(max-width:600px){.status-row{grid-template-columns:1fr 1fr}.mech-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">

  <div class="pixel-scene">
    <canvas id="pixelCanvas" width="960" height="600"></canvas>
    <div class="room-label" id="roomLabel">🏠 像素小人生活</div>
    <div class="pain-overlay" id="painOverlay"></div>
  </div>

  <div class="room-tabs">
    <div class="room-tab active" onclick="switchRoom('all')" id="tab-all">🏠 全景</div>

    <div class="status-box"><div class="status-label">活動</div><div class="status-val" id="activityText" style="font-size:12px">—</div></div>
  </div>

  <div class="activity-bar" id="activityBar">
    <span id="activityIcon">🏠</span>

  <div class="footer">PainMatrix v6.3.1 · 像素小人生活視覺化 · 每 3 秒刷新</div>
</div>

let drag = {active:false, startX:0, startY:0, moved:false};
let walkIndicator = null; // {x, y, t: timestamp}

function canvasX(clientX){
  let r = canvas.getBoundingClientRect();
  return (clientX - r.left) * (W / r.width);
}
function canvasY(clientY){
  let r = canvas.getBoundingClientRect();
  return (clientY - r.top) * (H / r.height);
}
function clickToWalk(cx, cy){
  let target = {x: Math.round(cx/PX), y: Math.round(cy/PX)};
  char.walkTarget = target;
  char.isMoving = true;
  char.activity = 'walk';
  walkIndicator = {x: cx, y: cy, t: Date.now()};
}
canvas.addEventListener('mousedown', e=>{
  drag.active = true;
  drag.startX = e.clientX; drag.startY = e.clientY;
  drag.moved = false;
});
canvas.addEventListener('mousemove', e=>{
  if(drag.active){
    let d = Math.hypot(e.clientX-drag.startX, e.clientY-drag.startY);
    if(d > 5) drag.moved = true;
  }
});
canvas.addEventListener('mouseup', e=>{
  if(drag.active){
    let d = Math.hypot(e.clientX-drag.startX, e.clientY-drag.startY);
    drag.active = false;
    if(!drag.moved){
      clickToWalk(canvasX(e.clientX), canvasY(e.clientY));
    }
  }
});
canvas.addEventListener('mouseleave', ()=>{ drag.active = false; });
// Touch support
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  let t = e.touches[0];
  drag.active = true; drag.startX = t.clientX; drag.startY = t.clientY; drag.moved = false;
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  let t = e.touches[0];
  let d = Math.hypot(t.clientX-drag.startX, t.clientY-drag.startY);
  if(d>5) drag.moved = true;
},{passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  if(drag.active && !drag.moved){
    let t = e.changedTouches[0];
    clickToWalk(canvasX(t.clientX), canvasY(t.clientY));
  }
  drag.active = false;
},{passive:false});

// ─── Pixel Helpers ───────────────────────────────────────
function pxRect(x,y,w,h,color){
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x*PX), Math.round(y*PX), Math.round(w*PX), Math.round(h*PX));
}
function pxCirc(cx,cy,r,color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(Math.round(cx*PX), Math.round(cy*PX), Math.round(r*PX), 0, Math.PI*2);
  ctx.fill();
}

function drawFloor(pl){

}

// ─── Draw Character ──────────────────────────────────────
function drawCharacter(x,y,pl,pose,frame,facing){
  let xc=Math.round(x*PX), yc=Math.round(y*PX);
  let f=facing;

  function cpx(dx,dy,w,h,color){
    ctx.fillStyle=color;
    ctx.fillRect(xc+f*dx*PX, yc+dy*PX, f*w*PX, h*PX);
  }

  // Colors
  const skinC = pl>=4?C.skinPale:(pl>=2?'#ddbb88':C.skin);
  const shirtC= pl>=4?C.shirtGrey:(pl>=2?'#664444':C.shirt);
  const pantsC= pl>=4?C.pantsGrey:C.pants;
  const hairC = pl>=4?'#555544':(pl>=3?'#333':C.hair);
  const eyeC  = pl>=3?C.eyeClosed:C.eye;
  const mouthC= pl>=4?C.mouthWail:(pl>=2?C.mouthFrown:C.mouth);

  // Animation
  let bob=0, legAnim=0, armAnim=0;
  if(pose==='walk'||pose==='slow_walk'||pose==='wince_walk'||pose==='limping'||pose==='crawl'||pose==='pacing'){
    let spd=pose==='slow_walk'?0.3:(pose==='limping'?0.2:(pose==='crawl'?0.25:0.5));
    legAnim=Math.sin(frame*spd*0.4)*2;
    bob=Math.abs(Math.sin(frame*spd*0.4))*1;
  } else if(pose==='dance'){
    legAnim=Math.sin(frame*0.6)*2;
    bob=Math.sin(frame*0.6)*1.5;
  } else if(pose==='jump'){
    bob=Math.abs(Math.sin(frame*0.5))*3;
  } else if(pose==='shake'||pose==='spasm'||pose==='shiver_sofa'){
    bob=Math.sin(frame*1.5)*0.5;
  } else if(pose==='roll'){
    bob=Math.sin(frame*0.3)*1;
  }

  // Blink
  let eyeH=2;
  if(pose!=='sleep'&&pose!=='no_response'){
    let bc=frame%120;
    if(bc<5) eyeH=1;
  }

  // ── SLEEP ──
  if(pose==='sleep'||pose==='restless_sleep'||pose==='nightmare'||pose==='no_response'||pose==='collapse_bed'||pose==='breathing'){
    cpx(-4,-3,4,3,skinC); cpx(-4,-3,4,1,hairC); cpx(-4,-3,1,2,hairC);
    cpx(-3,-2,1,eyeH, eyeC); cpx(-1,-2,1,eyeH, eyeC);
    cpx(-2,-1,1,1,mouthC);
    cpx(0,-3,6,3,shirtC); cpx(0,-2,1,2,skinC); cpx(5,-2,1,2,skinC);
    cpx(0,0,2,2,pantsC); cpx(2,0,2,2,pantsC);
    if(pose==='restless_sleep'||pose==='nightmare'){
      if(frame%30<20) cpx(2,-4,1,2,C.sweat);
      if(pose==='nightmare') cpx(-4,-5,1,1,'#ff4444');
    }
    if(pose==='sleep'&&frame%60<40){
      ctx.fillStyle='#aaaaff'; ctx.font=`${PX*3}px monospace`;
      ctx.fillText('z',xc+(-6)*f*PX,yc+(-5)*PX);
      ctx.font=`${PX*2}px monospace`;
      ctx.fillText('z',xc+(-5)*f*PX,yc+(-7)*PX);
    }
    return;
  }

  // ── LYING ──
  if(pose==='lie_floor'||pose==='lie_kitchen'||pose==='still_floor'||pose==='fetal'||pose==='roll'||pose==='floor_tremble'||pose==='still_bath'){
    let lx=-5, ly=-1;
    cpx(lx,ly,4,3,skinC); cpx(lx,ly,4,1,hairC);
    if(pl>=4){cpx(lx,ly,1,1,'#222');cpx(lx+1,ly-1,1,1,'#222');cpx(lx,ly-1,1,1,'#222');cpx(lx+1,ly,1,1,'#222');}
    else{cpx(lx,ly+1,2,1,eyeC);}
    cpx(lx+1,ly+1,1,1,mouthC);
    cpx(lx+4,ly,3,2,shirtC);
    cpx(lx+4,ly+1,1,2,skinC); cpx(lx-1,ly+1,1,2,skinC);
    cpx(lx+2,ly+2,2,1,pantsC); cpx(lx+4,ly+2,2,1,pantsC);
    if(pose==='fetal'||pose==='floor_tremble'){
      if(frame%20<15) cpx(3,-2,1,2,C.sweat);
      if(pose==='floor_tremble') cpx(3,-3,1,1,'#444');
    }
    if(pose==='roll'){
      ctx.save(); ctx.translate(xc+ly*PX*0.5, yc+lx*PX*0.5);
      ctx.rotate(frame*0.1); ctx.translate(-(xc+ly*PX*0.5),-(yc+lx*PX*0.5));
      ctx.restore();
    }
    return;
  }

  // ── CRAWL ──
  if(pose==='crawl'||pose==='crawl_pill'||pose==='last_crawl'){
    cpx(-3,-2,4,3,skinC); cpx(-3,-2,4,1,hairC);
    cpx(-2,-1,2,1,eyeC); cpx(0,-1,2,1,eyeC);
    cpx(-1,0,2,1,mouthC);
    cpx(-3,1,4,2,shirtC); cpx(-3,1,1,2,skinC); cpx(0,1,1,2,skinC);
    cpx(-2,3,2,2,pantsC); cpx(0,3,2,2,pantsC);
    if(pl>=3){cpx(1,-1,1,2,C.sweat);cpx(2,-2,1,1,C.sweat);}
    return;
  }

  // ── HEAD ──
  cpx(-2,-8,4,4,skinC); cpx(-2,-8,4,1,hairC);
  cpx(-2,-8,1,3,hairC); cpx(1,-8,1,3,hairC);
  // eyes
  if(pl>=4){cpx(-1,-6,1,1,'#222');cpx(0,-7,1,1,'#222');cpx(-1,-7,1,1,'#222');cpx(0,-6,1,1,'#222');}
  else{cpx(-1,-6,1,eyeH,eyeC);cpx(0,-6,1,eyeH,eyeC);}
  if(pl===0&&pose!=='walk'){cpx(-2,-5,1,1,C.blush);cpx(1,-5,1,1,C.blush);}
  // mouth
  if(pl===0) cpx(-1,-5,2,1,mouthC);
  else if(pl>=2) cpx(-1,-5,2,1,mouthC);
  // sweat
  if(pl>=2&&(pose==='stand'||pose==='sit'||pose==='walk'||pose==='game'||pose==='slow_walk')){
    let sy=-7+Math.floor(frame/30)%2;
    cpx(2,sy,1,2,C.sweat);
    if(pl>=3){cpx(3,sy-1,1,2,C.sweat);}
  }
  if(pl>=4){cpx(1,-5,1,2,C.tear);cpx(2,-4,1,2,C.tear);}

  // ── BODY ──
  cpx(-2,-4+bob,4,3,shirtC);

  // ── ARMS ──
  if(pose==='game'){cpx(-3,-3,1,2,skinC);cpx(2,-3,1,2,skinC);cpx(-1,-3,2,1,'#333');}
  else if(pose==='eat'){cpx(-3,-5,1,2,skinC);cpx(2,-5,1,2,skinC);cpx(-4,-6,2,1,'#ffaa44');cpx(2,-6,2,1,'#ffaa44');}
  else if(pose==='bath'){cpx(-3,-7,1,4,skinC);cpx(2,-7,1,4,skinC);}
  else if(pose==='cook'){cpx(2,-4+bob,1,3,skinC);cpx(2,-3,1,3,skinC);}
  else if(pose==='drink'){cpx(-3,-4,1,3,skinC);cpx(2,-4,1,3,skinC);cpx(2,-6,1,2,'#88ccff');}
  else if(pose==='pill'){cpx(-2,-4,2,1,'#ffffff');cpx(0,-4,2,1,'#ffffff');}
  else if(pose==='brush'||pose==='wash'){cpx(-3,-3,1,3,skinC);cpx(2,-3,1,3,skinC);}
  else if(pose==='sing'||pose==='dance'){cpx(-3,-5+Math.sin(frame*0.5)*2,1,2,skinC);cpx(2,-5-Math.sin(frame*0.5)*2,1,2,skinC);}
  else if(pose==='pray'){cpx(-2,-5,4,2,skinC);}
  else if(pose==='reach_sos'){cpx(4,-6,3,1,skinC);cpx(4,-5,3,1,skinC);}
  else if(pose==='cover_pain'){cpx(-2,-3,4,2,skinC);}
  else if(pose==='massage'){cpx(-3,-3,1,2,skinC);cpx(2,-3,1,2,skinC);}
  else if(pose==='hug_pillow'||pose==='hug_self'){cpx(-3,-4,1,3,skinC);cpx(2,-4,1,3,skinC);}
  else if(pose==='grip_sheet'){cpx(-3,-4,1,3,skinC);cpx(2,-4,1,3,skinC);}
  else if(pose==='scream_blanket'||pose==='hide_face'||pose==='hide_blanket'){cpx(-2,-6,4,3,skinC);}
  else if(pose==='headbang'){cpx(-3,-7,1,2,skinC);cpx(2,-7,1,2,skinC);cpx(-1,-8,2,1,'#333');cpx(0,-8,2,1,'#333');}
  else if(pose==='stretch'||pose==='yoga'){cpx(-4,-6,1,3,skinC);cpx(3,-6,1,3,skinC);}
  else if(pose==='stare'||pose==='stare_empty'||pose==='stare_phone'){cpx(-3,-4+bob,1,3,skinC);cpx(2,-4+bob,1,3,skinC);}
  else if(pose==='watch_clock'){cpx(0,-7,1,3,skinC);}
  else if(pose==='ice'){cpx(-3,-5,1,2,'#88ccff');cpx(2,-5,1,2,'#88ccff');}
  else if(pose==='call'){cpx(-2,-6,4,1,skinC);cpx(-2,-5,4,1,skinC);}
  else if(pose==='kick'){cpx(-4,-3,1,3,skinC);cpx(3,-3,1,3,skinC);}
  else {cpx(-3,-3+armAnim,1,3,skinC);cpx(2,-3-armAnim,1,3,skinC);}

  // ── LEGS ──
  if(pose==='sit'||pose==='sit_toilet'||pose==='lean'||pose==='stare'||pose==='sit_bed_sad'||pose==='lean_wall'||pose==='squat'){
    cpx(-2,-1,2,2,pantsC); cpx(0,-1,2,2,pantsC);
  } else if(pose==='crouch'||pose==='fetal'||pose==='curl'){
    cpx(-3,0,3,2,pantsC); cpx(0,0,3,2,pantsC);
  } else if(pose==='lie_bath'){
    cpx(-4,0,3,2,pantsC); cpx(-1,0,3,2,pantsC);
  } else {
    cpx(-2,-1+legAnim,2,2,pantsC); cpx(0,-1-legAnim,2,2,pantsC);
  }
}

// ─── Pick Next Activity ──────────────────────────────────
function pickNextActivity(pl, currentRoom){
  let candidates = ACTIVITIES_50.filter(a => {
    if(a.room !== 'any' && a.room !== currentRoom) return false;
    return pl >= a.minPL && pl <= a.maxPL;
  });
  if(candidates.length === 0){
    // fallback to generic
    candidates = ACTIVITIES_50.filter(a => a.minPL === pl && a.room === 'any');
  }
  if(candidates.length === 0) candidates = [{id:0,name:'发呆',icon:'💭',room:currentRoom,pose:'stand',minPL:0,maxPL:5,dur:150,desc:'一动不动地站着'}];
  // Prefer different from current
  let cur = char.activityDef;
  let choices = candidates.filter(a => !cur || a.id !== cur.id);
  if(choices.length === 0) choices = candidates;
  return choices[Math.floor(Math.random() * choices.length)];
}

// ─── Room Transition ─────────────────────────────────────
const ROOM_NEIGHBORS = {
  living:['kitchen','bath'], kitchen:['living','bed'],
  bath:['living','bed'], bed:['kitchen','bath'],
};
const ROOM_DOOR = {
  living:{kitchen:{x:82,y:28},bath:{x:39,y:57}},
  kitchen:{living:{x:78,y:28},bed:{x:117,y:57}},
  bath:{living:{x:39,y:53},bed:{x:78,y:72}},
  bed:{kitchen:{x:115,y:53},bath:{x:82,y:72}},
};

function tryChangeRoom(){
  let cur = char.currentRoom;
  let neighbors = ROOM_NEIGHBORS[cur] || [];
  if(neighbors.length === 0) return;
  let nextRoom = neighbors[Math.floor(Math.random() * neighbors.length)];
  let door = ROOM_DOOR[cur][nextRoom];
  char.walkTarget = {x:door.x, y:door.y, targetRoom:nextRoom};
  char.isMoving = true;
  char.activity = 'walk';
}

// ─── Update Character ─────────────────────────────────────
function updateChar(){
  char.frame++;
  char.activityTimer++;

  if(char.isMoving && char.walkTarget){
    let dx = char.walkTarget.x - char.x;
    let dy = char.walkTarget.y - char.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 1){
      if(char.walkTarget.targetRoom){
        char.currentRoom = char.walkTarget.targetRoom;
      }
      char.isMoving = false;
      char.x = char.walkTarget.x;
      char.y = char.walkTarget.y;
      char.walkTarget = null;
      // pick new activity in new room
      char.activityDef = pickNextActivity(gameState.painLevel, char.currentRoom);
      char.activity = char.activityDef.pose;
      char.activityTimer = 0;
    } else {
      char.x += (dx/dist) * char.walkSpeed;
      char.y += (dy/dist) * char.walkSpeed;
      char.facing = dx > 0 ? 1 : -1;
    }
  } else {
    // Activity timer check
    if(char.activityDef && char.activityTimer > char.activityDef.dur){
      // Try to change room sometimes
      if(Math.random() < 0.25){
        tryChangeRoom();
      } else {
        char.activityDef = pickNextActivity(gameState.painLevel, char.currentRoom);
        char.activity = char.activityDef.pose;
        char.activityTimer = 0;
      }
    }
  }

  // Movement speed affected by pain
  let pl = gameState.painLevel;
  if(pl >= 4 && char.isMoving) char.walkSpeed = 0.15;
  else if(pl >= 3 && char.isMoving) char.walkSpeed = 0.25;
  else if(pl >= 2 && char.isMoving) char.walkSpeed = 0.3;
  else char.walkSpeed = 0.4;

  // High pain: force low-activity pose
  if(pl >= 4 && !char.isMoving && Math.random() < 0.02){
    let highPainActs = ACTIVITIES_50.filter(a => a.minPL >= 4 && (a.room === char.currentRoom || a.room === 'any'));
    if(highPainActs.length > 0){
      let a = highPainActs[Math.floor(Math.random()*highPainActs.length)];
      char.activityDef = a;
      char.activity = a.pose;
      char.activityTimer = 0;
    }
  }
  // Draw click walk indicator
  if(walkIndicator && Date.now() - walkIndicator.t < 1500){
    let a = 1 - (Date.now()-walkIndicator.t)/1500;
    ctx.save();
    ctx.globalAlpha = a * 0.8;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(walkIndicator.x, walkIndicator.y, 6+Math.sin(Date.now()/100)*3, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(walkIndicator.x, walkIndicator.y, 12+Math.sin(Date.now()/100)*5, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  } else if(walkIndicator){
    walkIndicator = null;
  }
}

// ─── Main Draw ───────────────────────────────────────────
function drawScene(pl){
  ctx.fillStyle = pl >= 3 ? '#000' : C.bg;
  ctx.fillRect(0, 0, W, H);

  drawFloor(pl);
  drawWalls(pl);
  drawWindows(pl);
  drawDoors(pl);
  drawLivingRoom(pl);
  drawKitchen(pl);
  drawBathroom(pl);
  drawBedroom(pl);

  // Character
  let canDraw = true;
  if(char.currentRoom === 'living'){
    drawCharacter(char.x, char.y, pl, char.activity, char.frame, char.facing);
  } else if(char.currentRoom === 'kitchen'){
    drawCharacter(char.x-80, char.y, pl, char.activity, char.frame, char.facing);
  } else if(char.currentRoom === 'bath'){
    drawCharacter(char.x, char.y-55, pl, char.activity, char.frame, char.facing);
  } else if(char.currentRoom === 'bed'){
    drawCharacter(char.x-80, char.y-55, pl, char.activity, char.frame, char.facing);
  }
}

// ─── UI Update ───────────────────────────────────────────
function updateUI(){
  let pl = Math.min(gameState.painLevel, 5);
  let info = PAIN_INFO[pl];

  document.getElementById('painNum').textContent = pl;
  document.getElementById('painNum').style.color = info.color;
  document.getElementById('feltNum').textContent = gameState.feltPain.toFixed(1);
  document.getElementById('emotionText').textContent = gameState.emotion;
  document.getElementById('emotionText').style.color = info.color;

  const roomNames = {living:'🛋️ 客廳',kitchen:'🍳 廚房',bath:'🚽 浴室',bed:'🛏️ 臥室'};
  document.getElementById('locationText').textContent = roomNames[char.currentRoom] || '—';

  let actDef = char.activityDef;
  let actText = actDef ? actDef.name : (char.isMoving ? '走動中…' : '待機');
  let actIcon = actDef ? actDef.icon : (char.isMoving ? '🚶' : '💭');
  document.getElementById('activityText').textContent = actText;
  document.getElementById('activityIcon').textContent = actIcon;
  document.getElementById('activityName').textContent = actDef ? actDef.name : '待機';
  document.getElementById('activityTag').textContent = actDef ? actDef.desc.substring(0,20)+'…' : '';

  document.getElementById('roomLabel').textContent = info.room;
  document.getElementById('painOverlay').style.background = info.overlay;
  document.getElementById('phyDesc').textContent = info.phy;
  document.getElementById('menDesc').textContent = info.men;

  let logs = gameState.emotionLogs || [];
  let logList = document.getElementById('logList');
  if(logs.length === 0){
    logList.innerHTML = '<div class="empty-state">暫無記錄，試試在 PainMatrix 輸入 scold 或 praise</div>';
  } else {
    logList.innerHTML = logs.slice(-8).reverse().map(l => {
      let calm = l.emotion === '平靜' || l.pain_level === 0;
      return `<div class="log-item ${calm?'relief':''}">
        <span class="log-time">${l.timestamp}</span>
        <span class="log-emotion" style="color:${calm?'#2ed573':'#ff4757'}">${l.emotion}</span>
        <span class="log-level ${calm?'calm':'pain'}">Lv.${l.pain_level}</span>
        <span style="color:#666;margin-left:6px">${l.trigger||''}</span>
      </div>`;
    }).join('');
  }
}

// ─── Fetch ────────────────────────────────────────────────
async function fetchState(){
  try {
    let res = await fetch('http://127.0.0.1:17888/api/state', {cache:'no-cache'});
    let json = await res.json();
    gameState.painLevel = json.pain_level || 0;
    gameState.feltPain = json.felt_pain || 0;
    gameState.anxiety = json.anxiety_level || 0;
    gameState.emotion = json.emotion_state || '平靜';
    gameState.emotionLogs = json.emotion_log || [];
    gameState.dominantDesire = json.dominant_desire || '—';
    updateUI();
  } catch(e){}
}

// ─── Game Loop ────────────────────────────────────────────
function gameLoop(){
  tick++;
  updateChar();
  drawScene(gameState.painLevel);
  requestAnimationFrame(gameLoop);
}

// ─── Init ────────────────────────────────────────────────
char.activityDef = ACTIVITIES_50.find(a=>a.id===1) || ACTIVITIES_50[0];
char.activity = char.activityDef.pose;
char.x = 40; char.y = 40; char.facing = 1;

fetchState();
setInterval(fetchState, 3000);
gameLoop();

function switchRoom(room){
  currentView = room;
  document.querySelectorAll('.room-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+(room==='all'?'all':room)).classList.add('active');
}
